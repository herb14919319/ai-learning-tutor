<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Learning Tutor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #182033;
        --muted: #5f6f89;
        --accent: #2364aa;
        --accent-dark: #174f89;
        --border: #d9e1ec;
        --user: #e8f1ff;
        --assistant: #f1f5e8;
        --error: #fff0f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(940px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .intro {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 720px;
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .note {
        display: inline-block;
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        background: var(--panel);
        padding: 10px 14px;
        border-radius: 8px;
        color: var(--text);
      }

      .chat-shell {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 18px 46px rgba(24, 32, 51, 0.08);
      }

      .messages {
        min-height: 360px;
        max-height: 56vh;
        overflow-y: auto;
        padding: 20px;
      }

      .message {
        width: fit-content;
        max-width: min(720px, 92%);
        margin: 0 0 14px;
        padding: 12px 14px;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .message.assistant {
        background: var(--assistant);
      }

      .message.user {
        margin-left: auto;
        background: var(--user);
      }

      .message.error {
        background: var(--error);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid var(--border);
        background: #fbfcfe;
      }

      .quick-prompts {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-prompt {
        min-height: 40px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--accent);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .quick-prompt:hover {
        border-color: var(--accent);
        background: #f4f8ff;
      }

      textarea {
        width: 100%;
        min-height: 54px;
        max-height: 180px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        color: var(--text);
        font: inherit;
      }

      .send-button {
        align-self: end;
        min-height: 54px;
        border: 0;
        border-radius: 8px;
        padding: 0 22px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .send-button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 940px);
          padding: 28px 0;
        }

        .lead {
          font-size: 1rem;
        }

        .messages {
          min-height: 320px;
          max-height: 58vh;
          padding: 14px;
        }

        .message {
          max-width: 100%;
          padding: 12px;
        }

        form {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .quick-prompts {
          display: grid;
          grid-template-columns: 1fr;
        }

        .quick-prompt,
        .send-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">AI 學習助教</h1>
        <p class="lead">這裡不是一般聊天機器人，而是陪你理解 AI、Machine Learning、Deep Learning、RAG、AI Agent 等概念的學習入口。</p>
        <p class="lead">你可以用它拆解名詞、比較觀念、規劃 Top-down 學習路線，或把卡住的問題整理成下一步。</p>
        <p class="note">提醒：助教會引導理解，不是直接代寫作業。帶著你的想法來問，效果會更好。</p>
      </section>

      <section class="chat-shell" aria-label="AI Learning Tutor chat">
        <div id="messages" class="messages" aria-live="polite">
          <div class="message assistant">嗨，我是 AI 學習助教。你可以問我 AI、ML、Deep Learning、RAG 或 AI Agent 的觀念，我會用引導的方式幫你一步步理解。</div>
        </div>
        <form id="chat-form">
          <div class="quick-prompts" aria-label="快速問題">
            <button class="quick-prompt" type="button">AI Agent 是什麼？</button>
            <button class="quick-prompt" type="button">機器學習和深度學習差在哪？</button>
            <button class="quick-prompt" type="button">RAG 是什麼？</button>
            <button class="quick-prompt" type="button">我想用 Top-down 學 AI，該怎麼開始？</button>
          </div>
          <textarea id="message-input" name="message" placeholder="輸入你的 AI 學習問題..." required></textarea>
          <button id="send-button" class="send-button" type="submit">送出</button>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message-input");
      const button = document.querySelector("#send-button");
      const messages = document.querySelector("#messages");
      const quickPrompts = document.querySelectorAll(".quick-prompt");
      let isSubmitting = false;

      function appendMessage(text, role) {
        const bubble = document.createElement("div");
        bubble.className = `message ${role}`;
        bubble.textContent = text;
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
        return bubble;
      }

      quickPrompts.forEach((promptButton) => {
        promptButton.addEventListener("click", () => {
          input.value = promptButton.textContent;
          input.focus();
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isSubmitting) {
          return;
        }

        const message = input.value.trim();
        if (!message) {
          return;
        }

        appendMessage(message, "user");
        input.value = "";
        input.focus();
        isSubmitting = true;
        button.disabled = true;
        button.textContent = "整理中...";
        form.setAttribute("aria-busy", "true");
        quickPrompts.forEach((promptButton) => {
          promptButton.disabled = true;
        });
        const thinking = appendMessage("助教正在整理答案...", "assistant");

        try {
          const response = await fetch("/web-chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message}),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            console.error("Web chat request failed", {status: response.status, data});
            thinking.textContent = "助教剛剛有點卡住，請稍後再試一次。";
            thinking.classList.add("error");
            return;
          }

          thinking.textContent = data.reply || "助教剛剛有點卡住，請稍後再試一次。";
          thinking.classList.toggle("error", !data.reply);
        } catch (error) {
          console.error("Web chat request error", error);
          thinking.textContent = "助教剛剛有點卡住，請稍後再試一次。";
          thinking.classList.add("error");
        } finally {
          isSubmitting = false;
          button.disabled = false;
          button.textContent = "送出";
          form.removeAttribute("aria-busy");
          quickPrompts.forEach((promptButton) => {
            promptButton.disabled = false;
          });
        }
      });
    </script>
  </body>
</html>
