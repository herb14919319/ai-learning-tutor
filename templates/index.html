<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Learning Tutor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #182033;
        --muted: #5f6f89;
        --accent: #2364aa;
        --accent-dark: #174f89;
        --border: #d9e1ec;
        --user: #e8f1ff;
        --assistant: #f1f5e8;
        --error: #fff0f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(940px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .intro {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 720px;
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .note {
        display: inline-block;
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        background: var(--panel);
        padding: 10px 14px;
        border-radius: 8px;
        color: var(--text);
      }

      .chat-shell {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 18px 46px rgba(24, 32, 51, 0.08);
      }

      .messages {
        min-height: 360px;
        max-height: 56vh;
        overflow-y: auto;
        padding: 20px;
      }

      .message {
        width: fit-content;
        max-width: min(720px, 92%);
        margin: 0 0 14px;
        padding: 12px 14px;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .message.assistant {
        background: var(--assistant);
      }

      .message.user {
        margin-left: auto;
        background: var(--user);
      }

      .message.error {
        background: var(--error);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid var(--border);
        background: #fbfcfe;
      }

      textarea {
        width: 100%;
        min-height: 54px;
        max-height: 180px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        color: var(--text);
        font: inherit;
      }

      button {
        align-self: end;
        min-height: 54px;
        border: 0;
        border-radius: 8px;
        padding: 0 22px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 940px);
          padding: 28px 0;
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">AI Learning Tutor</h1>
        <p class="lead">把 AI、機器學習、深度學習、RAG、Agent 等概念拆成可以理解的小步驟，陪你釐清問題、建立觀念、練習表達。</p>
        <p class="note">這是 AI 學習助教，不是代寫作業工具。你可以帶著自己的想法來，我會給提示、引導和檢查方向。</p>
      </section>

      <section class="chat-shell" aria-label="AI Learning Tutor chat">
        <div id="messages" class="messages" aria-live="polite">
          <div class="message assistant">嗨，我是 AI Learning Tutor。你可以問我：「什麼是 Transformer attention？」或「RAG 跟 fine-tuning 差在哪？」</div>
        </div>
        <form id="chat-form">
          <textarea id="message-input" name="message" placeholder="輸入你的 AI 學習問題..." required></textarea>
          <button id="send-button" type="submit">送出</button>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message-input");
      const button = document.querySelector("#send-button");
      const messages = document.querySelector("#messages");

      function appendMessage(text, role) {
        const bubble = document.createElement("div");
        bubble.className = `message ${role}`;
        bubble.textContent = text;
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
        return bubble;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) {
          return;
        }

        appendMessage(message, "user");
        input.value = "";
        input.focus();
        button.disabled = true;
        const thinking = appendMessage("思考中...", "assistant");

        try {
          const response = await fetch("/web-chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message, user_id: "web-demo"}),
          });
          const data = await response.json().catch(() => ({}));
          thinking.textContent = data.reply || "我剛剛沒有順利產生回答，請換個問法再試一次。";
          thinking.classList.toggle("error", !response.ok);
        } catch (error) {
          thinking.textContent = "目前連線不太順，請稍後再試一次。";
          thinking.classList.add("error");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
